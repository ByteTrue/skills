feature: 2026-06-11-implementation-review-gate
created: 2026-06-11

steps:
  - action: "Shared contract: add implementation-review.md to current project and onboard template, and extend execution-mode evidence vocabulary"
    exit_signal: "current and onboard implementation-review.md define spec compliance and code quality gates, and both execution-modes.md copies include spec-compliance-review and code-quality-review"
    status: done
  - action: "Implementation integration: update bt-feat-impl completion report and startup context"
    exit_signal: "bt-feat-impl reads implementation-review.md and requires an Implementation Review Gate section with spec compliance before code quality"
    status: done
  - action: "Acceptance integration: update bt-feat-accept startup and verification rhythm"
    exit_signal: "bt-feat-accept checks for implementation review evidence and sends missing evidence back to implementation without weakening acceptance"
    status: done
  - action: "Template/index sync and validation: update onboard/system references and run checks"
    exit_signal: "onboard inventory includes implementation-review.md, references point to it, edited YAML validation passes"
    status: done

checks:
  - item: "Implementation Review Gate term is distinct from bt-feat-accept"
    source: term-contract
    status: passed
  - item: "Spec Compliance Review and Code Quality Review are defined, ordered, and separately reported"
    source: term-contract
    status: passed
  - item: "bt-feat-impl completion report includes Implementation Review Gate evidence"
    source: orchestration-skeleton
    status: passed
  - item: "bt-feat-accept checks implementation review evidence before proceeding"
    source: orchestration-skeleton
    status: passed
  - item: "execution-modes.md includes spec-compliance-review and code-quality-review evidence vocabulary"
    source: flow-level-constraint
    status: passed
  - item: "Spec compliance failure cannot be bypassed by code quality approval"
    source: flow-level-constraint
    status: passed
  - item: "Acceptance remains independent and is not weakened by implementation review"
    source: flow-level-constraint
    status: passed
  - item: "No subagent dispatch, context manifest, hook, worklog, CLI, or runtime state behavior is introduced"
    source: scope-guard
    status: passed
  - item: "Behavior Delta entries are materialized during acceptance"
    source: behavior-delta
    status: passed
  - item: "Edited docs remain concise"
    source: acceptance-scenario
    status: passed
