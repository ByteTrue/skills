feature: 2026-06-09-pi-package-install
created: 2026-06-09

steps:
  - action: "目录迁移：把 28 个 skill 目录移动到 skills/"
    exit_signal: "find skills -maxdepth 2 -name SKILL.md 返回 28"
    status: done
  - action: "静态 manifest：新增 / 更新根目录 package.json"
    exit_signal: "package.json 可解析，pi.skills 为 ./skills/*/SKILL.md"
    status: done
  - action: "Claude plugin：新增 .claude-plugin/plugin.json 和 .claude-plugin/marketplace.json"
    exit_signal: "两个 JSON 可解析，plugin name 为 bytetrue，marketplace name 为 bytetrue-skills"
    status: done
  - action: "文档安装入口：更新中文 / 英文 README 安装段"
    exit_signal: "两个 README 都包含 Claude plugin、pi install、pi -e 和 npx skills add"
    status: done
  - action: "smoke 验证：运行静态校验命令"
    exit_signal: "package/plugin JSON 解析通过，npx skills 可识别 28 个 skills，README 命令可 grep 到"
    status: done

