feature: 2026-06-11-onboard-template-rollout
created: 2026-06-11

steps:
  - action: "Reference parity audit: compare current and onboard reference file sets and classify differences"
    exit_signal: "parity result is documented in implementation report and missing reference files are resolved"
    status: done
  - action: "Install projection update: verify package/plugin metadata and update README Pi package wording"
    exit_signal: "package/plugin JSON parse, README mentions Pi skills plus optional runtime extension, and skill count is accurate"
    status: done
  - action: "Onboard maintenance note: document reference parity categories for future maintainers"
    exit_signal: "current and onboard maintainer notes explain managed-identical, managed-localized/current-specific, and project-owned reference categories"
    status: done
  - action: "Validation: run YAML/JSON/line-count/grep checks and no-release scope guard"
    exit_signal: "no publish, push, tag, external tracker, CLI, or new runtime behavior is introduced, and all files stay under 300 lines"
    status: done

checks:
  - item: "Reference filename parity holds between current .bytetrue/reference and onboard reference templates"
    source: acceptance-scenario
    status: passed
  - item: "Reference difference categories are documented for maintainers"
    source: term-contract
    status: passed
  - item: "bt-onboard inventory includes all AI workflow absorption references and worklog directory"
    source: mount-point
    status: passed
  - item: "README Pi install text mentions skills plus optional runtime extension"
    source: acceptance-scenario
    status: passed
  - item: "package.json includes pi.skills and pi.extensions and parses"
    source: mount-point
    status: passed
  - item: "Claude plugin and marketplace metadata parse without claiming hook support"
    source: scope-guard
    status: passed
  - item: "README skill badge count matches actual SKILL.md count"
    source: acceptance-scenario
    status: passed
  - item: "No project-owned reference is overwritten and no new workflow behavior is added"
    source: scope-guard
    status: passed
  - item: "Behavior Delta entries are materialized during acceptance"
    source: behavior-delta
    status: passed
  - item: "Markdown files stay under 300 lines and YAML/JSON/JSONL validation passes"
    source: acceptance-scenario
    status: passed
