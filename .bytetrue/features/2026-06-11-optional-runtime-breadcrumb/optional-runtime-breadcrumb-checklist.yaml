    status: passed
  - item: "Resolver maps draft design, pending steps, pending checks, and in-progress roadmap conservatively"
    source: acceptance-scenario
    status: passed
  - item: "No .bytetrue/state, .bytetrue/runtime, Claude hook, subagent dispatch, worklog, or standalone CLI is introduced"
    source: scope-guard
    status: passed
  - item: "Current/onboard breadcrumb references and system overview are synchronized"
    source: mount-point
    status: passed
  - item: "Behavior Delta entries are materialized during acceptance"
