feature: 2026-06-11-optional-runtime-breadcrumb
created: 2026-06-11

steps:
  - action: "Shared contract: add workflow-state-breadcrumb.md to current project and onboard template"
    exit_signal: "both references define state shape, resolver order, rendered block, and file-wins rule"
    status: done
  - action: "Pi extension: add read-only breadcrumb extension and package registration"
    exit_signal: "package.json keeps pi.skills and adds pi.extensions; extension uses before_agent_start and no-ops outside ByteTrue projects"
    status: done
  - action: "Onboard/index sync: release and index breadcrumb reference"
    exit_signal: "bt-onboard inventory and current/onboard system overview include workflow-state-breadcrumb.md"
    status: done
  - action: "Validation: run manifest, JSON, syntax, line-count, and scope checks"
    exit_signal: "YAML/JSONL parse, package JSON parse, extension syntax smoke, diff check, and no canonical state/CLI/subagent/worklog behavior"
    status: done

